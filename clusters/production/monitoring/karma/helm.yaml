---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karma
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: karma
      version: 2.12.2
      sourceRef:
        kind: HelmRepository
        name: wiremind-charts
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
    cleanupOnFail: true
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  values:
    env:
      - name: ALERTMANAGER_URI
        value: http://alertmanager.monitoring.svc.cluster.local:9093
    service:
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/tags: "tag:k8s,tag:k8s-monitoring"